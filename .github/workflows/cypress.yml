name: Cypress Tests

on:
  pull_request:
    branches:
      - master
      - main
      - development
  push:
    branches:
      - master
      - main
      - development

jobs:
  cypress-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress installation
        run: npx cypress verify

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headed: false
          config: video=true,screenshotOnRunFailure=true
        env:
          # Test against production site by default
          # Can be overridden with repository secret CYPRESS_BASE_URL
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL || 'https://novaramedia.com' }}
          # Cypress environment variables
          CYPRESS_VIDEO: true
          CYPRESS_SCREENSHOT_ON_FAILURE: true

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-artifacts
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7
